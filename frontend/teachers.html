<!DOCTYPE html>
<html lang="vi" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giáo viên - HOURSKILLS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <link rel="stylesheet" href="assets/tailwind.css">
    <script src="components/header-component.js"></script>
    <script src="components/navigation-injector.js"></script>
    <script src="api/header-notifications.js"></script>
    <script src="api/user-state.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 flex flex-col min-h-screen text-gray-800 dark:text-gray-200 transition-colors duration-300">
    <div id="header-placeholder"></div>
    <script>
        if (window.HourskillNavigation?.inject) {
            window.HourskillNavigation.inject({
                headerTargetId: 'header-placeholder',
                pageTitle: 'GIÁO VIÊN',
                hideSidebar: true,
            });
        }
    </script>

    <div class="flex flex-1 relative">
        <div id="sidebar-container"></div>

        <main class="ml-64 flex-1 px-10 py-12 bg-white dark:bg-gray-900 min-h-[calc(100vh-70px)] transition-colors duration-300">
            <section id="teacher-welcome" class="mb-10">
                <h1 class="text-4xl font-bold text-gray-800 dark:text-white mb-4 transition-colors">Xin chào bạn đến với HOURSKILLS!</h1>
                <p class="text-lg text-gray-600 dark:text-gray-400 leading-relaxed transition-colors">Khám phá hồ sơ giảng viên nổi bật và các video chất lượng cao từ cộng đồng HourSkills.</p>
            </section>

            <section id="teacher-profile" class="mb-14">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2 transition-colors">
                        <span class="w-2 h-8 bg-blue-500 rounded"></span> Hồ sơ giáo viên
                    </h2>
                </div>

                <div id="teachersLoading" class="text-gray-500 dark:text-gray-400">Đang tải hồ sơ giáo viên...</div>
                <div id="teachersEmpty" class="hidden text-gray-500 dark:text-gray-400">Chưa có giáo viên nào.</div>
                <div id="teacherCardContainer"></div>
            </section>

            <section id="featured-videos" class="mb-16" aria-label="Video nổi bật">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2 transition-colors">
                        <span class="w-2 h-8 bg-blue-500 rounded"></span> Video nổi bật
                    </h2>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8" id="teacherVideoGrid"></div>
                <p id="teacherVideoEmpty" class="text-gray-500 dark:text-gray-400">Đang tải video nổi bật...</p>
            </section>
        </main>
    </div>

    <footer class="bg-gray-800 dark:bg-gray-950 text-white py-8 ml-64 border-t border-gray-700 dark:border-gray-800 mt-auto z-10 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-6 text-center text-gray-400 dark:text-gray-500">
            <p>&copy; 2026 HOURSKILLS. Project by Diệp, Nhân, Trọng, Quỳnh Anh.</p>
        </div>
    </footer>

    <script src="js/components/sidebar.js"></script>
    <script>
        if (window.loadSidebar) {
            window.loadSidebar();
        }

        const API_BASE = 'http://127.0.0.1:8000';
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'login.html';
        }

        const htmlRoot = document.getElementById('html-root');
        const fallbackThumb = 'https://placehold.co/640x360/0b1f4d/FFFFFF?text=HourSkill';

        async function parseJsonResponse(response) {
            const contentType = response.headers.get('content-type') || '';
            if (!contentType.includes('application/json')) {
                if (!response.ok) {
                    throw new Error('Server returned HTML instead of JSON');
                }
                throw new Error('Phan hoi khong phai JSON');
            }
            return response.json();
        }

        function initTheme() {
            const wantsDark = localStorage.getItem('color-theme') === 'dark'
                || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);

            if (wantsDark) {
                htmlRoot.classList.add('dark');
            } else {
                htmlRoot.classList.remove('dark');
            }
        }

        initTheme();

        function formatTcDisplay(value) {
            return Math.floor(Number(value || 0)).toLocaleString('vi-VN');
        }

        function updateBalanceDisplay(newAmount) {
            if (newAmount == null) return;
            const normalized = Math.max(0, Math.floor(Number(newAmount || 0)));
            const text = formatTcDisplay(normalized);

            const targets = [
                document.getElementById('user-wallet-balance'),
                document.getElementById('tc-balance'),
                document.getElementById('tcBalanceHeader'),
                document.getElementById('walletBalance'),
            ];

            targets.forEach((el) => {
                if (el) {
                    el.innerText = text;
                }
            });

            localStorage.setItem('wallet_balance', String(normalized));
            if (window.HourskillUserState?.setUser) {
                window.HourskillUserState.setUser({ tc_balance: normalized });
            }
        }

        function applyHeaderUserState(userData) {
            const greeting = document.getElementById('headerUserGreeting');
            const crown = document.getElementById('headerVipCrown');
            const headerAvatar = document.getElementById('headerAvatar');
            const username = userData?.username || 'Guest';

            if (greeting) {
                greeting.innerText = `Chào, ${username}`;
            }
            if (crown) {
                crown.classList.toggle('hidden', !Boolean(userData?.is_vip));
            }
            if (headerAvatar && userData?.avatar_url) {
                headerAvatar.src = userData.avatar_url;
            }
            updateBalanceDisplay(userData?.tc_balance ?? 0);
        }

        async function syncUserData() {
            try {
                const response = await fetch(`${API_BASE}/api/me/`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const data = await parseJsonResponse(response);
                if (!response.ok) {
                    throw new Error(data.message || 'Không thể tải dữ liệu người dùng.');
                }
                applyHeaderUserState(data || {});
            } catch (err) {
                console.error('Failed to sync user data', err);
                applyHeaderUserState({ username: 'Guest', tc_balance: 0, is_vip: false });
            }
        }

        window.updateBalanceDisplay = updateBalanceDisplay;

        window.addEventListener('hourskill:balance-updated', (event) => {
            const next = event?.detail?.balance;
            if (next != null) {
                updateBalanceDisplay(next);
            }
        });

        window.addEventListener('storage', (event) => {
            if (event.key === 'wallet_balance' && event.newValue != null) {
                updateBalanceDisplay(event.newValue);
            }
        });

        const cachedUser = window.HourskillUserState?.getCachedUser
            ? window.HourskillUserState.getCachedUser()
            : { username: 'Guest', tc_balance: 0, is_vip: false };
        applyHeaderUserState(cachedUser);

        if (window.HourskillUserState?.subscribe) {
            window.HourskillUserState.subscribe((userData) => {
                applyHeaderUserState(userData || {});
            });
        }

        function escapeHtml(text) {
            return String(text || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function formatRating(value) {
            const num = Number(value || 0);
            return num > 0 ? num.toFixed(2) : '0.00';
        }

        function buildTeacherCard(teacher) {
            const card = document.createElement('article');
            card.className = 'bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-6 shadow-sm hover:shadow-md transition';

            const followLabel = teacher.is_following ? 'Đã theo dõi' : 'Theo dõi';
            const followClass = teacher.is_following
                ? 'bg-emerald-600 hover:bg-emerald-700'
                : 'bg-blue-600 hover:bg-blue-700';

            const teacherId = Number(teacher.id || 0);
            const teacherName = escapeHtml(teacher.username || 'Diep');
            const teacherAvatar = teacher.avatar_url || 'https://placehold.co/160x160/e2e8f0/64748b?text=U';
            const teacherSpecialization = escapeHtml(teacher.specialization || 'Giảng viên đa lĩnh vực');
            const teacherBio = escapeHtml(teacher.bio || 'Chưa cập nhật mô tả lĩnh vực giảng dạy.');
            const teacherViews = Number(teacher.total_views || 0).toLocaleString('vi-VN');
            const teacherFollowers = Number(teacher.followers_count || 0).toLocaleString('vi-VN');
            const teacherRating = formatRating(teacher.avg_rating);

            card.innerHTML = `
                <div class="flex flex-col md:flex-row md:items-center gap-6">
                    <a href="channel.html?id=${teacherId}" class="shrink-0">
                        <img src="${teacherAvatar}" alt="${teacherName}" class="w-24 h-24 rounded-full object-cover border-2 border-blue-400" loading="lazy" onerror="this.onerror=null;this.src='https://placehold.co/160x160/e2e8f0/64748b?text=U'" />
                    </a>
                    <div class="flex-1 min-w-0">
                        <a href="channel.html?id=${teacherId}" class="block text-2xl font-bold text-gray-900 dark:text-white hover:text-blue-500">${teacherName}</a>
                        <p class="text-sm text-blue-600 dark:text-blue-400 font-semibold mt-1">${teacherSpecialization}</p>
                        <p class="text-sm text-gray-600 dark:text-gray-300 mt-2 leading-relaxed">${teacherBio}</p>
                    </div>
                    <div class="w-full md:w-56 shrink-0 flex md:flex-col items-start md:items-end justify-between gap-3">
                        <div class="text-sm text-gray-600 dark:text-gray-300">
                            <p>Lượt xem: <span class="font-bold text-gray-900 dark:text-white">${teacherViews}</span></p>
                            <p>Điểm TB: <span class="font-bold text-amber-500">⭐ ${teacherRating}</span></p>
                            <p>Follower: <span class="font-semibold">${teacherFollowers}</span></p>
                        </div>
                        <button class="follow-btn ${followClass} text-white text-sm font-semibold px-4 py-2 rounded-lg transition" data-teacher-id="${teacherId}" data-following="${teacher.is_following ? '1' : '0'}">${followLabel}</button>
                    </div>
                </div>
            `;
            return card;
        }

        function updateFollowButtonState(button, isFollowing) {
            button.dataset.following = isFollowing ? '1' : '0';
            button.textContent = isFollowing ? 'Đã theo dõi' : 'Theo dõi';
            button.classList.remove('bg-blue-600', 'hover:bg-blue-700', 'bg-emerald-600', 'hover:bg-emerald-700');
            if (isFollowing) {
                button.classList.add('bg-emerald-600', 'hover:bg-emerald-700');
            } else {
                button.classList.add('bg-blue-600', 'hover:bg-blue-700');
            }
        }

        async function toggleFollow(teacherId, button) {
            button.disabled = true;
            const oldLabel = button.textContent;
            button.textContent = 'Đang xử lý...';
            try {
                const res = await fetch(`${API_BASE}/api/follow/${teacherId}/`, {
                    method: 'POST',
                    headers: {
                        Authorization: `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ creator_id: teacherId })
                });
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.message || 'Không thể theo dõi giáo viên.');
                }

                updateFollowButtonState(button, Boolean(data.is_following));
                const statLine = button.closest('article')?.querySelector('p:last-child span');
                if (statLine) {
                    statLine.textContent = Number(data.followers_count || 0).toLocaleString('vi-VN');
                }
            } catch (err) {
                console.error(err);
                button.textContent = oldLabel;
                alert(err.message || 'Có lỗi xảy ra khi theo dõi.');
            } finally {
                button.disabled = false;
            }
        }

        function buildVideoCard(video) {
            const title = escapeHtml(video?.title || 'Video chưa có tiêu đề');
            const creator = escapeHtml(video?.creator || 'Diep');
            const tc = Number(video?.price_tc || 0);
            const thumb = String(video?.thumbnail || '').trim() || fallbackThumb;
            const id = Number(video?.id || 0);
            const hasVideoId = Number.isFinite(id) && id > 0;
            const wrapperTag = hasVideoId ? 'a' : 'article';
            const wrapperHref = hasVideoId ? ` href="video-detail.html?id=${id}"` : '';
            const cursorClass = hasVideoId ? 'hover:shadow-lg' : 'cursor-default';

            return `
                <${wrapperTag}${wrapperHref} class="featured-video-card block bg-slate-900 rounded-xl overflow-hidden border border-slate-700 ${cursorClass} transition">
                    <div class="relative w-full aspect-video bg-black">
                        <img src="${thumb}" alt="${title}" class="w-full h-full object-cover" loading="lazy" onerror="this.onerror=null;this.src='${fallbackThumb}'" />
                        <span class="absolute top-2 right-2 bg-black/80 text-white text-xs px-2 py-1 rounded">${tc} TC</span>
                    </div>
                    <div class="p-4">
                        <h3 class="featured-video-title font-semibold text-white line-clamp-2">${title}</h3>
                        <p class="featured-video-creator text-sm text-slate-300 mt-2">${creator}</p>
                    </div>
                </${wrapperTag}>
            `;
        }

        async function loadTeacherProfile() {
            const loading = document.getElementById('teachersLoading');
            const empty = document.getElementById('teachersEmpty');
            const container = document.getElementById('teacherCardContainer');

            loading.classList.remove('hidden');
            empty.classList.add('hidden');
            container.innerHTML = '';

            try {
                const res = await fetch(`${API_BASE}/api/teachers/`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const contentType = res.headers.get('content-type') || '';
                if (!res.ok || !contentType.includes('application/json')) {
                    throw new Error('Server returned HTML instead of JSON');
                }
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Không tải được danh sách giáo viên.');

                const teachers = Array.isArray(data.teachers) ? data.teachers : [];
                loading.classList.add('hidden');

                if (!teachers.length) {
                    empty.classList.remove('hidden');
                    empty.innerText = 'Chưa có giáo viên nào.';
                    return;
                }

                const targetTeacher = teachers.find((teacher) => String(teacher?.username || '').toLowerCase() === 'diep') || teachers[0];
                container.appendChild(buildTeacherCard(targetTeacher));

                const followButton = container.querySelector('.follow-btn');
                if (followButton) {
                    followButton.addEventListener('click', () => {
                        const id = Number(followButton.dataset.teacherId);
                        toggleFollow(id, followButton);
                    });
                }
            } catch (err) {
                loading.classList.add('hidden');
                empty.classList.remove('hidden');
                empty.innerText = err.message || 'Không tải được hồ sơ giáo viên.';
            }
        }

        async function loadTeacherFeaturedVideos() {
            const grid = document.getElementById('teacherVideoGrid');
            const empty = document.getElementById('teacherVideoEmpty');

            if (!grid || !empty) return;

            grid.innerHTML = '';
            empty.classList.remove('hidden');
            empty.innerText = 'Đang tải video nổi bật...';

            const fallbackVideos = [
                {
                    id: null,
                    title: 'Hướng dẫn cài đặt PowerBI Desktop',
                    creator: 'Diep',
                    price_tc: 8,
                    thumbnail: fallbackThumb,
                },
                {
                    id: null,
                    title: 'Python tricks - Viết code chuyên nghiệp',
                    creator: 'Diep',
                    price_tc: 8,
                    thumbnail: fallbackThumb,
                },
                {
                    id: null,
                    title: 'Rèn luyện kỹ năng nói hay và trôi chảy',
                    creator: 'Diep',
                    price_tc: 10,
                    thumbnail: fallbackThumb,
                },
            ];

            try {
                const res = await fetch(`${API_BASE}/api/manage/videos/?standalone=1`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const data = await parseJsonResponse(res);

                let videos = [];
                if (res.ok) {
                    const allVideos = Array.isArray(data?.videos) ? data.videos : [];
                    const teacherVideos = allVideos.filter((video) => String(video?.creator || '').toLowerCase() === 'diep');
                    videos = (teacherVideos.length ? teacherVideos : allVideos).slice(0, 3).map((video) => ({
                        ...video,
                        thumbnail: String(video?.thumbnail || '').trim() || fallbackThumb,
                    }));
                }

                if (!videos.length) {
                    videos = fallbackVideos;
                }

                grid.innerHTML = videos.map(buildVideoCard).join('');
                empty.classList.add('hidden');
            } catch (err) {
                console.error('Không tải được video nổi bật giáo viên:', err);
                grid.innerHTML = fallbackVideos.map(buildVideoCard).join('');
                empty.classList.add('hidden');
            }
        }

        syncUserData();
        initHeaderNotifications({ apiBase: API_BASE, token });
        loadTeacherProfile();
        loadTeacherFeaturedVideos();
    </script>
</body>
</html>
