<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tạo khóa học - HourSkills</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl w-full max-w-xl p-8">

<div class="text-center mb-6">

<h1 class="text-3xl font-bold text-gray-800">
🎓 Tạo khóa học mới
</h1>

<p class="text-gray-500 text-sm mt-2">
Chia sẻ link video và lan tỏa kiến thức của bạn
</p>

</div>


<p id="errorMsg" class="text-red-500 text-sm mb-4 text-center"></p>


<form id="courseForm" class="space-y-5">

<div>
<label class="block text-sm font-medium text-gray-700 mb-1">
Tên khóa học
</label>

<input
type="text"
name="title"
required
class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none"
placeholder="Ví dụ: Python cho người mới"
/>
</div>


<div>
<label class="block text-sm font-medium text-gray-700 mb-1">
Mô tả khóa học
</label>

<textarea
name="description"
required
rows="3"
class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none"
placeholder="Tóm tắt nội dung khóa học"
></textarea>
</div>


<div>
<label class="block text-sm font-medium text-gray-700 mb-1">
Giá khóa học (TC)
</label>

<input
type="number"
name="bundle_price_tc"
required
min="0"
class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none"
placeholder="Ví dụ: 50"
/>

<p class="text-xs text-gray-400 mt-1">
Token Coin (TC) là tiền trong nền tảng
</p>

</div>


<div>
<label class="block text-sm font-medium text-gray-700 mb-1">
Danh mục
</label>

<select
name="category"
id="categorySelect"
class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none"
>
<option value="">Chọn danh mục (tuỳ chọn)</option>
</select>

<p class="text-xs text-gray-400 mt-1">
Danh sách được tải từ API /api/courses/.
</p>

</div>


<div>

<label class="block text-sm font-medium text-gray-700 mb-2">
Link chia sẻ video (Google Drive)
</label>

<input
type="text"
name="video_url"
required
id="videoInput"
class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none"
placeholder="Ví dụ: https://drive.google.com/file/d/1a2b3c.../view"
/>

<p class="text-xs text-gray-400 mt-1">
Dán link Drive ở chế độ "Bất kỳ ai có đường liên kết".
</p>

</div>


<div>
<label class="block text-sm font-medium text-gray-700 mb-1">
Thumbnail (ảnh, tuỳ chọn)
</label>

<input
type="file"
name="thumbnail"
id="thumbnailInput"
accept="image/*"
class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none"
/> 

<p class="text-xs text-gray-400 mt-1">
Nếu bỏ trống, hệ thống sẽ dùng thumbnail mặc định.
</p>

</div>


<div id="videoPreviewContainer" class="hidden">

<label class="block text-sm font-medium text-gray-700 mb-2">
Preview video
</label>

<iframe
id="videoPreview"
class="w-full aspect-video rounded-lg border"
allow="autoplay"
></iframe>

</div>


<button
type="submit"
id="submitBtn"
class="w-full bg-blue-600 hover:bg-blue-700 transition text-white font-semibold py-2 rounded-lg"
>

🚀 Tạo khóa học

</button>

</form>

</div>



<script>

const form = document.getElementById("courseForm")
const errorMsg = document.getElementById("errorMsg")
const submitBtn = document.getElementById("submitBtn")
const videoInput = document.getElementById("videoInput")
const videoPreview = document.getElementById("videoPreview")
const previewContainer = document.getElementById("videoPreviewContainer")
const categorySelect = document.getElementById("categorySelect")
const thumbnailInput = document.getElementById("thumbnailInput")

// Fetch categories for select
async function loadCategories(){
    try{
        const res = await fetch("http://127.0.0.1:8000/api/categories/")
        const data = await res.json()
        console.log("[loadCategories] status", res.status, "payload", data)
        if(res.ok && Array.isArray(data.categories)){
            data.categories.forEach((c)=>{
                const opt = document.createElement("option")
                opt.value = c.id
                opt.textContent = c.name
                categorySelect.appendChild(opt)
            })
        } else {
            console.warn("[loadCategories] Unexpected payload shape", data)
        }
    }catch(err){
        console.error("[loadCategories] failed", err)
        // Non-blocking: keep default option
    }
}

function normalizeDriveUrl(raw){
    if(!raw) return ""
    const srcMatch = raw.match(/src\s*=\s*"([^"]+)"/i) || raw.match(/src\s*=\s*'([^']+)'/i)
    if(srcMatch && srcMatch[1]) return srcMatch[1].trim()

    const idMatch = raw.match(/\/d\/([a-zA-Z0-9_-]+)/) || raw.match(/id=([a-zA-Z0-9_-]+)/)
    if(idMatch && idMatch[1]){
        return `https://drive.google.com/file/d/${idMatch[1]}/preview`
    }
    return raw.trim()
}

loadCategories()


/* VIDEO PREVIEW - XỬ LÝ LINK GOOGLE DRIVE TỰ ĐỘNG */

videoInput.addEventListener("input", function(){

const url = this.value.trim()

if(!url) {
    previewContainer.classList.add("hidden")
    videoPreview.src = ""
    return
}

// Regex: Tự động quét để tìm ID của video trong link Drive
const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);

if(match && match[1]){
    const videoId = match[1];
    
    // Tự động tạo link iframe chuẩn đuôi preview để hiển thị
    videoPreview.src = `https://drive.google.com/file/d/${videoId}/preview`;
    previewContainer.classList.remove("hidden")
    errorMsg.innerText = ""
} else {
    previewContainer.classList.add("hidden")
    videoPreview.src = ""
    errorMsg.innerText = "Link Google Drive không hợp lệ!"
}

})



/* SUBMIT FORM */

form.addEventListener("submit", async (e)=>{

e.preventDefault()

errorMsg.innerText = ""

submitBtn.disabled = true
submitBtn.innerText = "⏳ Đang lưu khóa học..."

const title = form.title.value.trim()
const description = form.description.value.trim()
const price = form.bundle_price_tc.value
const category = form.category.value
const cleanedVideoUrl = normalizeDriveUrl(videoInput.value)

if(!cleanedVideoUrl){
    errorMsg.innerText = "Vui lòng nhập link Google Drive hợp lệ trước khi gửi."
    submitBtn.disabled = false
    submitBtn.innerText = "🚀 Tạo khóa học"
    return
}

const formData = new FormData()
formData.append("title", title)
formData.append("description", description)
formData.append("bundle_price_tc", price)
if(category) formData.append("category", category)
formData.append("video_url", cleanedVideoUrl)

if(thumbnailInput.files && thumbnailInput.files[0]){
    formData.append("thumbnail", thumbnailInput.files[0])
}

try{

const token = localStorage.getItem("token")

if(!token){

errorMsg.innerText = "Bạn chưa đăng nhập!"
submitBtn.disabled = false
submitBtn.innerText = "🚀 Tạo khóa học"
return

}


const res = await fetch("http://127.0.0.1:8000/api/create-course/",{

method:"POST",

headers:{
"Authorization":"Bearer " + token
},

body:formData

})


const data = await res.json()


if(res.ok && data.course_id){

window.location.href =
`video-detail.html?course_id=${data.course_id}`

}else{

errorMsg.innerText = data.message || "Tạo khóa học thất bại"

}


}catch(err){

errorMsg.innerText = "Không kết nối được backend"

}finally{

submitBtn.disabled = false
submitBtn.innerText = "🚀 Tạo khóa học"

}

})

</script>

</body>
</html>
