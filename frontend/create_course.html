<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tạo khóa học - HourSkills</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl w-full max-w-xl p-8">

<!-- HEADER -->

<div class="text-center mb-6">

<h1 class="text-3xl font-bold text-gray-800">
🎓 Tạo khóa học mới
</h1>

<p class="text-gray-500 text-sm mt-2">
Tải lên video và chia sẻ kiến thức của bạn
</p>

</div>


<p id="errorMsg" class="text-red-500 text-sm mb-4 text-center"></p>


<form id="courseForm" class="space-y-5">

<!-- TITLE -->

<div>
<label class="block text-sm font-medium text-gray-700 mb-1">
Tên khóa học
</label>

<input
type="text"
name="title"
required
class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none"
placeholder="Ví dụ: Python cho người mới"
/>
</div>


<!-- PRICE -->

<div>
<label class="block text-sm font-medium text-gray-700 mb-1">
Giá khóa học (TC)
</label>

<input
type="number"
name="price_tc"
required
min="0"
class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none"
placeholder="Ví dụ: 50"
/>

<p class="text-xs text-gray-400 mt-1">
Token Coin (TC) là tiền trong nền tảng
</p>

</div>


<!-- VIDEO UPLOAD -->

<div>

<label class="block text-sm font-medium text-gray-700 mb-2">
Video khóa học
</label>

<input
type="file"
name="video"
accept="video/mp4"
required
id="videoInput"
class="w-full border rounded-lg p-2"
/>

<p class="text-xs text-gray-400 mt-1">
Chỉ hỗ trợ file MP4
</p>

</div>


<!-- VIDEO PREVIEW -->

<div id="videoPreviewContainer" class="hidden">

<label class="block text-sm font-medium text-gray-700 mb-2">
Preview video
</label>

<video
id="videoPreview"
controls
class="w-full rounded-lg border"
></video>

</div>


<!-- SUBMIT -->

<button
type="submit"
id="submitBtn"
class="w-full bg-blue-600 hover:bg-blue-700 transition text-white font-semibold py-2 rounded-lg"
>

🚀 Tạo khóa học

</button>

</form>

</div>



<script>

const form = document.getElementById("courseForm")
const errorMsg = document.getElementById("errorMsg")
const submitBtn = document.getElementById("submitBtn")
const videoInput = document.getElementById("videoInput")
const videoPreview = document.getElementById("videoPreview")
const previewContainer = document.getElementById("videoPreviewContainer")


/* VIDEO PREVIEW */

videoInput.addEventListener("change", function(){

const file = this.files[0]

if(!file) return

if(file.type !== "video/mp4"){

errorMsg.innerText = "Chỉ được upload video MP4"
videoInput.value = ""
return

}

previewContainer.classList.remove("hidden")

videoPreview.src = URL.createObjectURL(file)

})



/* SUBMIT FORM */

form.addEventListener("submit", async (e)=>{

e.preventDefault()

errorMsg.innerText = ""

submitBtn.disabled = true
submitBtn.innerText = "⏳ Đang tải video..."


const formData = new FormData(form)

try{

const token = localStorage.getItem("token")

if(!token){

errorMsg.innerText = "Bạn chưa đăng nhập!"
submitBtn.disabled = false
submitBtn.innerText = "Tạo khóa học"
return

}


const res = await fetch("http://127.0.0.1:8000/api/create-course/",{

method:"POST",

headers:{
"Authorization":"Bearer " + token
},

body:formData

})


const data = await res.json()


if(res.ok && data.course_id){

window.location.href =
`video-detail.html?course_id=${data.course_id}`

}else{

errorMsg.innerText = data.message || "Tạo khóa học thất bại"

}


}catch(err){

errorMsg.innerText = "Không kết nối được backend"

}finally{

submitBtn.disabled = false
submitBtn.innerText = "🚀 Tạo khóa học"

}

})

</script>

</body>
</html>
