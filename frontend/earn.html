<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Xem video kiếm TC</title>

<style>
body{
    font-family: Arial;
    text-align:center;
}

#timer{
    font-size:30px;
    font-weight:bold;
    margin:20px;
}
</style>

</head>

<body>

<h2>Xem video để nhận TC</h2>

<div id="timer">Thời gian còn lại: 30 giây</div>

<video id="video" width="700" controls controlsList="nodownload noplaybackrate"> <!-- FIX -->
<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<script>

let video = document.getElementById("video")
let timeLeft = 30
let timer = document.getElementById("timer")

let interval = null
let rewardGiven = false
let isProcessing = false
let tabActive = true
let lastTime = 0 // FIX: lưu vị trí video trước

function formatTcDisplay(value){
    return Math.floor(Number(value || 0)).toLocaleString('vi-VN')
}

function syncGlobalBalance(newBalance){
    const safeBalance = Math.floor(Number(newBalance || 0))

    const candidates = [
        document.getElementById("user-wallet-balance"),
        document.querySelector(".tc-balance"),
        document.querySelector("#headerWalletBalance span"),
    ]

    candidates.forEach(node => {
        if(node){
            node.innerText = formatTcDisplay(safeBalance)
        }
    })

    localStorage.setItem("wallet_balance", String(safeBalance))
    window.dispatchEvent(new CustomEvent("hourskill:balance-updated", {
        detail: { balance: safeBalance }
    }))
}

async function grantEarnTcReward(){
    if(isProcessing || rewardGiven){
        return
    }

    isProcessing = true

    try{
        const token = localStorage.getItem("token")
        if(!token){
            alert("Bạn cần đăng nhập để nhận TC")
            return
        }

        const res = await fetch("http://127.0.0.1:8000/api/earn-tc/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({ source: "ad-30s" })
        })

        const data = await res.json()

        if(!res.ok || data.status !== "success"){
            alert(data.message || "Không thể cộng TC")
            return
        }

        rewardGiven = true
        const newBalance = Math.floor(Number(data.new_balance || 0))
        syncGlobalBalance(newBalance)
        alert(`Bạn đã nhận +1 TC. Số dư mới: ${formatTcDisplay(newBalance)} TC`)
    }catch(err){
        alert("Lỗi server khi cộng TC")
    }finally{
        isProcessing = false
    }
}


// cập nhật timer
function updateTimer(){
    timer.innerText = "Thời gian còn lại: " + timeLeft + " giây"
}


// bắt đầu đếm
function startCounting(){

    if(interval) return

    interval = setInterval(()=>{

        if(video.paused || !tabActive){
            return
        }

        timeLeft--

        updateTimer()

        if(timeLeft <= 0){

            clearInterval(interval)

            if(!rewardGiven){
                grantEarnTcReward()

            }

        }

    },1000)

}


// khi play video
video.addEventListener("play",()=>{
    startCounting()
})


// ❌ chặn tua video (FIX)
video.addEventListener("seeking",function(){

    if(video.currentTime > lastTime + 0.5){
        video.currentTime = lastTime
    }

})


// lưu thời gian xem gần nhất (FIX)
video.addEventListener("timeupdate",function(){
    lastTime = video.currentTime
})


// khi đổi tab (FIX)
document.addEventListener("visibilitychange",function(){

    if(document.hidden){
        tabActive = false
        video.pause()
    }
    else{
        tabActive = true
    }

})


// lấy csrf
function getCookie(name) {
    let cookieValue = null
    if (document.cookie && document.cookie !== '') {
        let cookies = document.cookie.split(';')
        for (let i = 0; i < cookies.length; i++) {
            let cookie = cookies[i].trim()
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1))
                break
            }
        }
    }
    return cookieValue
}

updateTimer()

</script>

</body>
</html>
