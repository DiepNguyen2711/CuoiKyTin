<!DOCTYPE html>
<html lang="vi" id="html-root">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kênh giáo viên - HOURSKILLS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <link rel="stylesheet" href="assets/tailwind.css" />
    <script src="components/header-component.js"></script>
    <script src="components/navigation-injector.js"></script>
    <script src="api/header-notifications.js"></script>
    <script src="api/user-state.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 flex flex-col min-h-screen text-gray-800 dark:text-gray-200 transition-colors duration-300">
    <div id="header-placeholder"></div>
    <script>
        if (window.HourskillNavigation?.inject) {
            window.HourskillNavigation.inject({
                headerTargetId: 'header-placeholder',
                pageTitle: 'KÊNH GIÁO VIÊN',
                hideSidebar: true,
            });
        }
    </script>

    <div class="flex flex-1 relative">
        <div id="sidebar-container"></div>

        <main class="ml-64 flex-1 px-10 py-12 bg-white dark:bg-gray-900 min-h-[calc(100vh-70px)] transition-colors duration-300">
            <section class="mb-10">
                <div class="flex items-center justify-between gap-4 flex-wrap">
                    <h1 class="text-3xl font-bold text-gray-800 dark:text-white">Kênh giáo viên</h1>
                    <a href="main.html" class="px-4 py-2 rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 transition">← Quay lại trang chủ</a>
                </div>
            </section>

            <section class="mb-12" id="creatorProfileSection">
                <article class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-6 shadow-sm">
                    <div class="flex flex-col md:flex-row md:items-center gap-6">
                        <img id="creatorAvatar" src="https://placehold.co/160x160/e2e8f0/64748b?text=U" alt="Avatar giáo viên" class="w-24 h-24 rounded-full object-cover border-2 border-blue-400" loading="lazy" onerror="this.onerror=null;this.src='https://placehold.co/160x160/e2e8f0/64748b?text=U'" />
                        <div class="flex-1 min-w-0">
                            <h2 id="creatorName" class="text-2xl font-bold text-gray-900 dark:text-white">Đang tải...</h2>
                            <p id="creatorSpecialization" class="text-sm text-blue-600 dark:text-blue-400 mt-2">Dang cap nhat chuyen mon</p>
                            <p id="creatorBio" class="text-sm text-gray-600 dark:text-gray-300 mt-1">Dang cap nhat mo ta giang vien</p>
                            <p class="text-sm text-gray-500 dark:text-gray-400 mt-2"><span id="followersCount">0</span> người theo dõi</p>
                            <div class="mt-3 flex items-center gap-2 flex-wrap">
                                <span class="inline-flex items-center rounded-full bg-blue-50 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 px-3 py-1 text-xs font-semibold border border-blue-200 dark:border-blue-800">Khoa hoc: <span id="totalCourses" class="ml-1">0</span></span>
                                <span class="inline-flex items-center rounded-full bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-3 py-1 text-xs font-semibold border border-slate-200 dark:border-slate-600">Video: <span id="totalVideos" class="ml-1">0</span></span>
                            </div>
                        </div>
                        <button id="followBtn" type="button" class="px-4 py-2 rounded-lg text-sm font-semibold bg-blue-600 text-white hover:bg-blue-700 transition">Theo dõi</button>
                    </div>
                </article>
            </section>

            <section class="mb-12" id="featuredCoursesSection">
                <div class="flex items-center justify-between mb-5">
                    <h3 class="text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2">
                        <span class="w-2 h-8 bg-blue-500 rounded"></span> Khóa học nổi bật
                    </h3>
                </div>
                <div id="courseList" class="space-y-3"></div>
                <p id="courseEmpty" class="hidden text-gray-500 dark:text-gray-400">Chưa có khóa học nào.</p>
            </section>

            <section id="featuredVideosSection" class="mb-16">
                <div class="flex items-center justify-between mb-5">
                    <h3 class="text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2">
                        <span class="w-2 h-8 bg-blue-500 rounded"></span> Video nổi bật
                    </h3>
                </div>
                <div id="videoList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
                <p id="videoEmpty" class="hidden text-gray-500 dark:text-gray-400">Chưa có video nào.</p>
            </section>
        </main>
    </div>

    <footer class="bg-gray-800 dark:bg-gray-950 text-white py-8 ml-64 border-t border-gray-700 dark:border-gray-800 mt-auto z-10 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-6 text-center text-gray-400 dark:text-gray-500">
            <p>&copy; 2026 HOURSKILLS. Project by Diệp, Nhân, Trọng, Quỳnh Anh.</p>
        </div>
    </footer>

    <script src="js/components/sidebar.js"></script>
    <script>
        if (window.loadSidebar) {
            window.loadSidebar();
        }
    </script>
    <script src="api/channel.js"></script>
</body>
</html>
