<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kênh Creator</title>
  <link rel="stylesheet" href="assets/variables.css" />
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(37, 99, 235, 0.08), transparent 35%),
        radial-gradient(circle at 90% 10%, rgba(14, 165, 233, 0.09), transparent 42%),
        #f6f9ff;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      border-radius: var(--card-radius);
      background: var(--surface-card-bg);
      border: 1px solid var(--surface-card-border);
      box-shadow: var(--surface-card-shadow);
    }
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .page-title {
      margin: 0;
      color: var(--slate-900);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .top-nav-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    .follow-btn {
      margin-top: 8px;
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #4f46e5;
      color: white;
    }
    .followed {
      background: #9ca3af;
    }
    .course {
      border: 1px solid #e2e8f0;
      padding: 14px;
      border-radius: 8px;
      margin-top: 10px;
      display: block;
      text-decoration: none;
      color: inherit;
      transition: background-color 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }
    .course:hover {
      background: #f8f9fa;
      border-color: #bfdbfe;
      cursor: pointer;
      transform: translateY(-1px);
    }
    .course-title {
      color: var(--slate-900);
      font-weight: 700;
      margin: 0;
    }
    .course-meta {
      color: var(--slate-700);
      font-size: 0.92rem;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="top-nav">
      <h1 class="page-title">Kênh Creator</h1>
      <div class="top-nav-actions">
        <a id="myCoursesLink" href="channel.html" class="hs-btn hs-btn-primary">Khóa học của tôi</a>
        <a href="main.html" class="hs-btn">Trang chủ</a>
      </div>
    </div>

    <div class="header">
      <div class="avatar" id="avatar">?</div>
      <div>
        <h2 id="username">Đang tải...</h2>
        <p>
          <span id="followers">0</span> người theo dõi
        </p>
        <button id="followBtn" class="follow-btn">Theo dõi</button>
      </div>
    </div>

    <hr style="margin: 24px 0" />

    <h3>Khóa học</h3>
    <div id="courseList"></div>
  </div>

  <script src="api/channel.js"></script>
</body>
</html>
