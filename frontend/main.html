<!DOCTYPE html>
<html lang="vi" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOURSKILLS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <link rel="stylesheet" href="assets/tailwind.css">
    <script src="components/header-component.js"></script>
    <script src="components/navigation-injector.js"></script>
    <script src="api/header-notifications.js"></script>
    <script src="api/user-state.js"></script>
    <script src="api/live-filter.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 flex flex-col min-h-screen text-gray-800 dark:text-gray-200 transition-colors duration-300">
    <div id="header-placeholder"></div>
    <script>
        if (window.HourskillNavigation?.inject) {
            window.HourskillNavigation.inject({
                headerTargetId: 'header-placeholder',
                pageTitle: 'TRANG CHỦ',
                hideSidebar: true,
            });
        }
    </script>

    <div class="flex flex-1 relative">
        <div id="sidebar-container"></div>

        <main class="ml-64 flex-1 px-10 py-12 bg-white dark:bg-gray-900 min-h-[calc(100vh-70px)] transition-colors duration-300">
            <section id="home" class="mb-12">
                <h1 class="text-4xl font-bold text-gray-800 dark:text-white mb-4 transition-colors">Xin chào bạn đến với HOURSKILLS!</h1>
                
                <div class="bg-blue-50 dark:bg-blue-900/30 border-l-4 border-blue-500 p-4 mb-6 inline-block rounded-r-lg transition-colors hidden" id="walletBanner">
                    <p class="text-blue-700 dark:text-blue-300 font-medium">
                        💰 Ví của bạn: <span class="font-bold text-blue-900 dark:text-blue-400" id="walletBalance">--</span> TC
                    </p>
                </div>
                
                <p class="text-lg text-gray-600 dark:text-gray-400 leading-relaxed transition-colors">Nền tảng học trực tuyến hàng đầu với các khóa học chất lượng cao từ các giáo viên giàu kinh nghiệm.</p>
            </section>

            <section id="featured-videos" class="mb-16" aria-label="Video nổi bật">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2 transition-colors">
                        <span class="w-2 h-8 bg-blue-500 rounded"></span> Video nổi bật
                    </h2>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8" id="standaloneGrid"></div>
                <p id="standaloneEmpty" class="text-gray-500 dark:text-gray-400">Đang tải video nổi bật...</p>
            </section>
        </main>
    </div>

    <footer class="bg-gray-800 dark:bg-gray-950 text-white py-8 ml-64 border-t border-gray-700 dark:border-gray-800 mt-auto z-10 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-6 text-center text-gray-400 dark:text-gray-500">
            <p>&copy; 2026 HOURSKILLS. Project by Diệp, Nhân, Trọng, Quỳnh Anh.</p>
        </div>
    </footer>

    <script src="js/components/sidebar.js"></script>
    <script>
        if (window.loadSidebar) {
            window.loadSidebar();
        }

        const htmlRoot = document.getElementById('html-root');

        function initTheme() {
            const wantsDark = localStorage.getItem('color-theme') === 'dark'
                || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);

            if (wantsDark) {
                htmlRoot.classList.add('dark');
            } else {
                htmlRoot.classList.remove('dark');
            }
        }

        initTheme();

        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        function applyHeaderUserState(userData) {
            const greeting = document.getElementById('headerUserGreeting');
            const crown = document.getElementById('headerVipCrown');
            const headerAvatar = document.getElementById('headerAvatar');
            const username = userData?.username || 'Guest';

            if (greeting) {
                greeting.innerText = `Chào, ${username}`;
            }
            if (crown) {
                crown.classList.toggle('hidden', !Boolean(userData?.is_vip));
            }
            if (headerAvatar && userData?.avatar_url) {
                headerAvatar.src = userData.avatar_url;
            }
            updateBalanceDisplay(userData?.tc_balance ?? 0, { emitEvent: false });
        }

        async function syncUserData() {
            if (!token) return;
            try {
                const userData = await window.HourskillUserState.fetchCurrentUser({
                    apiBase: 'http://127.0.0.1:8000',
                    token,
                    timeoutMs: 4500,
                });
                applyHeaderUserState(userData || {});
            } catch (err) {
                applyHeaderUserState({ username: 'Guest', tc_balance: 0, is_vip: false });
                console.error('Failed to sync user data', err);
            }
        }

        window.syncUserData = syncUserData;

        function formatTcDisplay(value) {
            return Math.floor(Number(value || 0)).toLocaleString('vi-VN');
        }

        function updateBalanceDisplay(newAmount, options = {}) {
            const { emitEvent = true } = options;
            if (newAmount == null) return;
            const normalized = Math.max(0, Math.floor(Number(newAmount || 0)));
            const text = formatTcDisplay(normalized);

            const targets = [
                document.getElementById('user-wallet-balance'),
                document.getElementById('tc-balance'),
                document.getElementById('tcBalanceHeader'),
                document.getElementById('walletBalance'),
            ];

            targets.forEach((el) => {
                if (el) {
                    el.innerText = text;
                }
            });

            localStorage.setItem('wallet_balance', String(normalized));
            if (emitEvent && window.HourskillUserState?.setUser) {
                window.HourskillUserState.setUser({ tc_balance: normalized });
            }
            if (emitEvent) {
                window.dispatchEvent(new CustomEvent('hourskill:balance-updated', {
                    detail: { balance: normalized }
                }));
            }
        }

        window.updateBalanceDisplay = updateBalanceDisplay;

        window.addEventListener('hourskill:balance-updated', (event) => {
            const next = event?.detail?.balance;
            if (next != null) {
                updateBalanceDisplay(next, { emitEvent: false });
            }
        });

        window.addEventListener('storage', (event) => {
            if (event.key === 'wallet_balance' && event.newValue != null) {
                updateBalanceDisplay(event.newValue, { emitEvent: false });
            }
        });

        const cachedUser = window.HourskillUserState?.getCachedUser
            ? window.HourskillUserState.getCachedUser()
            : { username: 'Guest', tc_balance: 0, is_vip: false };
        applyHeaderUserState(cachedUser);

        if (window.HourskillUserState?.subscribe) {
            window.HourskillUserState.subscribe((userData) => {
                applyHeaderUserState(userData || {});
            });
        }

        syncUserData();

        initHeaderNotifications({ apiBase: 'http://127.0.0.1:8000', token });

        const fallbackThumb = 'https://placehold.co/640x360/0b1f4d/FFFFFF?text=HourSkill';

        function resolveThumbnail(video) {
            const candidates = [
                video?.thumbnail,
                video?.thumbnail_url,
                video?.thumbnailUrl,
                video?.image,
                video?.image_url,
            ];

            const picked = candidates.find((value) => typeof value === 'string' && value.trim());
            return picked || fallbackThumb;
        }

        function escapeHtml(text) {
            return String(text || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function renderFeaturedVideoCard(video) {
            const title = video?.title || 'Video chưa có tiêu đề';
            const creator = video?.creator || 'Unknown Creator';
            const tc = Number(video?.price_tc || 0);
            const thumb = resolveThumbnail(video);

            return `
                <a href="video-detail.html?id=${video.id}" class="featured-video-card block bg-slate-900 rounded-xl overflow-hidden border border-slate-700 hover:shadow-lg transition">
                    <div class="relative w-full aspect-video bg-black">
                        <img src="${thumb}" alt="${escapeHtml(title)}" class="w-full h-full object-cover" loading="lazy" onerror="this.onerror=null;this.src='${fallbackThumb}'" />
                        <span class="absolute top-2 right-2 bg-black/80 text-white text-xs px-2 py-1 rounded">${tc} TC</span>
                    </div>
                    <div class="p-4">
                        <h3 class="featured-video-title font-semibold text-white line-clamp-2">${escapeHtml(title)}</h3>
                        <p class="featured-video-creator text-sm text-slate-300 mt-2">${escapeHtml(creator)}</p>
                    </div>
                </a>
            `;
        }

        async function loadFeaturedVideos() {
            const grid = document.getElementById('standaloneGrid');
            const empty = document.getElementById('standaloneEmpty');

            if (!grid || !empty) return;

            grid.innerHTML = '';
            empty.classList.remove('hidden');
            empty.innerText = 'Đang tải video nổi bật...';

            try {
                const res = await fetch('http://127.0.0.1:8000/api/manage/videos/?standalone=1', {
                    headers: {
                        Authorization: `Bearer ${token}`,
                    },
                });
                const data = await res.json();

                // Debug payload from API to verify file_url/thumbnail values in browser console.
                console.log('[Home][FeaturedVideos] API payload:', data);

                const allVideos = Array.isArray(data?.videos) ? data.videos : [];
                const creatorVideos = allVideos.filter((video) => String(video?.creator || '').toLowerCase() === 'diep');
                const videos = (creatorVideos.length ? creatorVideos : allVideos).slice(0, 3);

                if (!res.ok || videos.length === 0) {
                    empty.innerText = 'Chưa có video nổi bật để hiển thị.';
                    return;
                }

                grid.innerHTML = videos.map(renderFeaturedVideoCard).join('');
                empty.classList.add('hidden');
            } catch (error) {
                console.error('[Home][FeaturedVideos] Failed to load videos:', error);
                empty.innerText = 'Không tải được video nổi bật.';
            }
        }

        loadFeaturedVideos();
    </script>
</body>
</html>
