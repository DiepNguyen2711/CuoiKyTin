<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiết khóa học</title>
  <link rel="stylesheet" href="assets/variables.css">
  <link rel="stylesheet" href="assets/tailwind.css">
  <script src="components/header-component.js"></script>
  <script src="components/sidebar-component.js"></script>
  <script src="components/navigation-injector.js"></script>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(37, 99, 235, 0.08), transparent 34%),
        radial-gradient(circle at 86% 10%, rgba(14, 165, 233, 0.10), transparent 42%),
        #f7faff;
      color: var(--slate-900);
    }

    .page {
      max-width: 980px;
      margin: 34px auto;
      background: var(--surface-card-bg);
      border-radius: var(--card-radius);
      padding: 22px;
      box-shadow: var(--surface-card-shadow);
      border: 1px solid var(--surface-card-border);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .course-title {
      margin: 0;
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--slate-900);
    }

    .course-desc {
      margin-top: 8px;
      color: var(--slate-700);
      line-height: 1.5;
    }

    .section-title {
      margin-top: 24px;
      margin-bottom: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #1e293b;
    }

    .video-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .video-item {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: #fff;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .video-item:hover {
      background: #f8f9fa;
      border-color: #bfdbfe;
    }

    .video-left {
      min-width: 0;
    }

    .video-name {
      margin: 0;
      font-weight: 700;
      color: #0f172a;
    }

    .video-meta {
      margin-top: 5px;
      color: #475569;
      font-size: 0.9rem;
    }

    .video-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .play-icon {
      font-size: 1rem;
      color: #2563eb;
      font-weight: 700;
    }

    .price-tag {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 999px;
      padding: 5px 10px;
    }

    .video-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .notice {
      color: #64748b;
      margin-top: 8px;
    }

    @media (max-width: 768px) {
      .video-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .video-right {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>
  <script>
    if (window.HourskillNavigation?.inject) {
      window.HourskillNavigation.inject({
        headerTargetId: 'header-placeholder',
        pageTitle: 'CHI TIẾT KHÓA HỌC',
        hideSidebar: true,
      });
    }
  </script>

  <main class="page">
    <div class="top-bar">
      <a id="backToChannel" class="hs-btn" href="channel.html">← Quay lại kênh</a>
      <a id="myCoursesLink" class="hs-btn hs-btn-primary" href="channel.html">Khóa học của tôi</a>
    </div>

    <h1 id="courseTitle" class="course-title">Đang tải khóa học...</h1>
    <p id="courseDesc" class="course-desc"></p>

    <h2 class="section-title">Danh sách video</h2>
    <div id="videoList" class="video-list"></div>
    <p id="emptyNotice" class="notice" style="display:none;">Khóa học này chưa có video.</p>
  </main>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const token = localStorage.getItem("token");
    const params = new URLSearchParams(window.location.search);

    const courseId = params.get("id") || params.get("course_id");
    const viewerId = localStorage.getItem("user_id") || sessionStorage.getItem("user_id") || "";

    const courseTitleEl = document.getElementById("courseTitle");
    const courseDescEl = document.getElementById("courseDesc");
    const videoListEl = document.getElementById("videoList");
    const emptyNoticeEl = document.getElementById("emptyNotice");
    const backToChannelEl = document.getElementById("backToChannel");
    const myCoursesLinkEl = document.getElementById("myCoursesLink");

    if (myCoursesLinkEl) {
      myCoursesLinkEl.href = viewerId
        ? `channel.html?id=${encodeURIComponent(viewerId)}`
        : "create_course.html";
    }

    function parseDuration(totalSeconds) {
      const sec = Math.max(0, Number(totalSeconds || 0));
      const mins = Math.floor(sec / 60);
      const remain = sec % 60;
      return `${String(mins).padStart(2, "0")}:${String(remain).padStart(2, "0")}`;
    }

    function computePriceByDuration(seconds) {
      const safe = Math.max(0, Number.parseInt(seconds || 0, 10));
      return Math.max(1, Math.ceil(safe / 60));
    }

    function ensureCourseId() {
      if (courseId) return true;
      if (token) {
        window.location.href = "main.html";
      } else {
        window.location.href = "login.html";
      }
      return false;
    }

    function renderVideos(videos) {
      if (!Array.isArray(videos) || videos.length === 0) {
        videoListEl.innerHTML = "";
        emptyNoticeEl.style.display = "block";
        return;
      }

      emptyNoticeEl.style.display = "none";

      videoListEl.innerHTML = videos.map((video) => {
        const videoPrice = Number(video.price_tc ?? computePriceByDuration(video.duration_seconds));
        return `
          <a class="video-link" href="video-detail.html?id=${encodeURIComponent(video.id)}&course_id=${encodeURIComponent(courseId)}">
            <article class="video-item">
              <div class="video-left">
                <p class="video-name">${video.title || "Video"}</p>
                <p class="video-meta">Thời lượng: ${parseDuration(video.duration_seconds || 0)}</p>
              </div>
              <div class="video-right">
                <span class="play-icon">▶ Phát</span>
                <span class="price-tag">${videoPrice} TC</span>
              </div>
            </article>
          </a>
        `;
      }).join("");
    }

    async function loadCourseDetail() {
      if (!ensureCourseId()) return;

      try {
        const res = await fetch(`${API_BASE}/api/manage/courses/${courseId}/`, {
          headers: token ? { Authorization: `Bearer ${token}` } : {},
        });
        const data = await res.json();

        if (!res.ok) {
          courseTitleEl.innerText = "Không tải được khóa học";
          courseDescEl.innerText = data.message || "Vui lòng thử lại sau.";
          renderVideos([]);
          return;
        }

        courseTitleEl.innerText = data.title || "Khóa học";
        courseDescEl.innerText = data.description || "Không có mô tả.";
        renderVideos(data.videos || []);

        const ownerId = data.instructor_id || "";
        if (ownerId) {
          backToChannelEl.href = `channel.html?id=${encodeURIComponent(ownerId)}`;
        } else if (viewerId) {
          backToChannelEl.href = `channel.html?id=${encodeURIComponent(viewerId)}`;
        }
      } catch (_) {
        courseTitleEl.innerText = "Lỗi tải dữ liệu";
        courseDescEl.innerText = "Không kết nối được máy chủ.";
        renderVideos([]);
      }
    }

    loadCourseDetail();
  </script>
</body>
</html>
