<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Detail - HourSkill</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-7xl mx-auto px-6 py-10">

<div class="grid grid-cols-1 lg:grid-cols-3 gap-10">

<!-- LEFT SIDE -->
<div class="lg:col-span-2">

<!-- VIDEO PLAYER -->
<div class="bg-black rounded-xl overflow-hidden shadow-lg">

<video
id="videoPlayer"
controls
class="w-full h-[480px] object-contain"
></video>

</div>

<!-- TITLE -->
<h1
id="videoTitle"
class="text-3xl font-bold mt-6"
></h1>

<!-- CREATOR -->
<div class="flex items-center justify-between mt-5 border-b pb-5">

<div class="flex items-center gap-4">

<img
id="creatorAvatar"
class="w-12 h-12 rounded-full object-cover"
src="https://i.pravatar.cc/100"
/>

<div>

<p
id="creatorName"
class="font-semibold text-lg"
></p>

<p class="text-sm text-gray-500">
Creator
</p>

</div>

</div>

<button
class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-full text-sm"
>
🔔 Theo dõi
</button>

</div>


<!-- COMMENT -->
<div class="mt-10">

<h2 class="text-xl font-bold mb-4">
Bình luận
</h2>

<textarea
id="commentInput"
placeholder="Viết bình luận..."
class="w-full border rounded-lg p-3 mb-3"
></textarea>

<div class="flex items-center gap-3 mb-5">

<select
id="ratingInput"
class="border p-2 rounded"
>

<option value="">Không đánh giá</option>
<option value="5">5⭐</option>
<option value="4">4⭐</option>
<option value="3">3⭐</option>
<option value="2">2⭐</option>
<option value="1">1⭐</option>

</select>

<button
onclick="postComment(videoId)"
class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded"
>
Gửi bình luận
</button>

</div>

<div
id="commentList"
class="space-y-4"
></div>

</div>

</div>

<!-- RIGHT SIDE -->
<div>

<div class="bg-white p-6 rounded-xl shadow">

<h2 class="text-xl font-semibold mb-4">
Khóa học
</h2>

<p class="text-gray-600 mb-6">
Mua video để mở khóa toàn bộ nội dung
</p>

<button
onclick="buyVideo()"
class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-lg font-semibold"
>
💰 Mua video
</button>

</div>

</div>

</div>

</div>


<!-- POPUP LOCK -->

<div
id="unlockPopup"
class="hidden fixed inset-0 bg-black/60 flex items-center justify-center"
>

<div class="bg-white p-6 rounded-xl w-[360px] shadow-xl">

<h2 class="text-xl font-bold mb-3">
🔒 Video bị khóa
</h2>

<p
id="unlockText"
class="text-gray-600 mb-4"
></p>

<p
id="balanceText"
class="text-sm text-gray-500 mb-4"
></p>

<button
id="unlockBtn"
onclick="buyVideo()"
class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg"
>
Mở khóa
</button>

</div>

</div>


<script>

const token = localStorage.getItem("token");

if (!token)
window.location.href="login.html";


const params = new URLSearchParams(window.location.search);
const videoId = params.get("id");


async function loadVideo(){

try{

const res = await fetch(
`http://localhost:8000/api/video/${videoId}/`,
{
headers:{
Authorization:`Bearer ${token}`
}
}
);

const data = await res.json();

document.getElementById("videoTitle").innerText =
data.title || "";

document.getElementById("creatorName").innerText =
data.creator?.name || "Unknown Creator";

document.getElementById("creatorAvatar").src =
data.creator?.avatar || "https://i.pravatar.cc/100";


if(data.locked){

document
.getElementById("unlockPopup")
.classList.remove("hidden");

document
.getElementById("unlockText")
.innerText=`Bạn cần ${data.requiredTC} TC để mở khóa`;

if(data.userTC!=null){

document
.getElementById("balanceText")
.innerText=`Số dư: ${data.userTC} TC`;

}

}else{

const player=document.getElementById("videoPlayer");

player.src=data.videoUrl;
player.load();
player.play();

}

loadComments(videoId);

}catch(e){

alert("Không tải được video");

}

}



async function buyVideo(){

try{

const res=await fetch(
`http://localhost:8000/api/video/${videoId}/unlock`,
{
method:"POST",
headers:{
Authorization:`Bearer ${token}`
}
}
);

const data=await res.json();

if(res.ok){

document
.getElementById("unlockPopup")
.classList.add("hidden");

const player=document.getElementById("videoPlayer");

player.src=data.videoUrl;

player.load();
player.play();

alert("Mua video thành công");

}else{

alert(data.message);

}

}catch(e){

alert("Lỗi server");

}

}



async function loadComments(videoId){

try{

const res=await fetch(
`http://localhost:8000/api/video/${videoId}/comments/`,
{
headers:{
Authorization:`Bearer ${token}`
}
}
);

const data=await res.json();

const list=document.getElementById("commentList");

list.innerHTML="";

data.forEach(c=>{

const div=document.createElement("div");

div.className="bg-white p-4 rounded-lg shadow";

div.innerHTML=`

<p class="font-semibold">${c.user}</p>

<p class="text-gray-700 mt-1">${c.comment}</p>

<p class="text-yellow-500">
${c.rating?"⭐".repeat(c.rating):""}
</p>

`;

list.appendChild(div);

});

}catch(e){

console.log("Không load comment");

}

}



async function postComment(videoId){

const comment=document.getElementById("commentInput").value;

const rating=document.getElementById("ratingInput").value;

if(!comment){

alert("Bạn chưa nhập bình luận");

return;

}

const res=await fetch(
`http://localhost:8000/api/video/${videoId}/comment/`,
{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:`Bearer ${token}`
},
body:JSON.stringify({
comment,
rating
})
}
);

if(res.ok){

document.getElementById("commentInput").value="";
document.getElementById("ratingInput").value="";

loadComments(videoId);

}else{

alert("Không gửi được bình luận");

}

}


loadVideo();

</script>

</body>
</html>
